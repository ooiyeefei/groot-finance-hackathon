# Processing Configuration for Curated RAG Pipeline
processing_config:
  chunk_size: 512
  chunk_overlap: 100
  min_chunk_length: 100
  max_chunks_per_document: 500
  
  # Checksum validation for versioning
  validate_checksums: true
  checksum_file: "checksums.json"
  
  # Text cleaning and processing
  remove_headers_footers: true
  normalize_whitespace: true
  remove_empty_lines: true
  
  # Language processing
  detect_language: true
  translate_non_english: false  # Keep original language for authority
  
  # Output configuration
  output_format: "json"
  include_metadata: true
  preserve_structure: true
  output_file: "processed_chunks.json"

# Embedding Configuration for Vector Storage
embedding_config:
  # Use custom LiteLLM endpoint with Qwen3 embedding model
  endpoint_url: "https://litellm.eks.kopi.io/v1"
  model_id: "openai/qwen3-embedding-4b-bf16-cpu"
  api_key_env: "EMBEDDING_API_KEY"
  dimension: 2560  # Qwen3-4B uses 2560 dimensions
  batch_size: 32
  max_tokens: 8192
  
# Qdrant Collection Configuration for Regulatory KB
qdrant_config:
  collection_name: "regulatory_kb"
  vector_size: 2560  # Updated to match Qwen3-4B embedding dimensions
  distance: "Cosine"
  on_disk_payload: true
  replication_factor: 1
  
  # Enhanced metadata indexing for compliance queries
  payload_indexes:
    - field_name: "country"
      field_type: "keyword"
    - field_name: "tax_type" 
      field_type: "keyword"
    - field_name: "topics"
      field_type: "keyword"
    - field_name: "document_version"
      field_type: "keyword"
    - field_name: "language"
      field_type: "keyword"