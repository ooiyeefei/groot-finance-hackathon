name: Breach Incident Report
description: Log a security incident or suspected data breach (PDPA compliance)
title: "[BREACH] "
labels: ["type:breach-incident"]
body:
  - type: markdown
    attributes:
      value: |
        ## PDPA Breach Incident Report
        Complete all fields. This form satisfies SG PDPA Section 26E record-keeping requirements.
        **Do not delete or skip sections** — all fields must be documented for regulatory compliance.
        Reference: `docs/compliance/breach-notification-sop.md`

  - type: input
    id: detection-date
    attributes:
      label: Date/time detected
      placeholder: "YYYY-MM-DD HH:MM (UTC+8)"
    validations:
      required: true

  - type: dropdown
    id: detection-method
    attributes:
      label: How detected
      options:
        - CloudWatch Alarm
        - Sentry Alert
        - Clerk Suspicious Activity
        - AWS GuardDuty
        - User Report (admin@hellogroot.com)
        - Internal Audit
        - Third-party Notification
        - Other
    validations:
      required: true

  - type: input
    id: detected-by
    attributes:
      label: Detected by
      placeholder: "Name or system"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity Classification
      description: "See SOP Section 6 for classification criteria"
      options:
        - P1 Critical — Personal data exposed/exfiltrated
        - P2 High — Unauthorized access detected
        - P3 Medium — Near-miss, anomalous pattern
        - P4 Low — Minor vulnerability, no exposure
    validations:
      required: true

  - type: textarea
    id: severity-rationale
    attributes:
      label: Severity rationale
      placeholder: "Explain why this severity level was chosen"
    validations:
      required: true

  - type: dropdown
    id: is-data-breach
    attributes:
      label: Data breach per legal definition?
      description: "Unauthorised access/collection/use/disclosure/modification/disposal of personal data, or loss of storage medium where unauthorised access is likely (SG PDPA Section 26A)"
      options:
        - "Yes"
        - "No"
        - Under investigation
    validations:
      required: true

  - type: checkboxes
    id: prescribed-data
    attributes:
      label: SG prescribed personal data categories involved
      description: "Check all that apply. Any checked category triggers the 'significant harm' notification ground."
      options:
        - label: "#1 Non-public financial information"
        - label: "#2 Vulnerable individual identification data"
        - label: "#3 Life/accident/health insurance information"
        - label: "#4 Medical information (HIV/STD/mental health)"
        - label: "#5 Adoption records"
        - label: "#6 Private cryptographic keys"
        - label: "#7 Account access credentials (username + password)"
        - label: None of the above

  - type: input
    id: individuals-affected
    attributes:
      label: Estimated individuals affected
      placeholder: "Number or 'Under investigation'"
    validations:
      required: true

  - type: dropdown
    id: jurisdiction
    attributes:
      label: Jurisdictions affected
      description: "If unknown, select 'Unknown (assume both)' as conservative default"
      options:
        - Malaysia only
        - Singapore only
        - Both (MY + SG)
        - Unknown (assume both)
    validations:
      required: true

  - type: input
    id: assessment-date
    attributes:
      label: Assessment completion date
      description: "SG PDPA 3-day notification clock starts from this date"
      placeholder: "YYYY-MM-DD or 'In progress'"
    validations:
      required: true

  - type: textarea
    id: notification-decisions
    attributes:
      label: Notification decisions
      description: "Document whether regulator, individual, and/or customer notification is required, and why. See SOP Section 8 (Decision Tree)."
      placeholder: |
        - Regulator notification required?: Yes (MY) / Yes (SG) / Yes (both) / No
        - Rationale:
        - Individual notification required?: Yes / No
        - Customer notification required?: Yes (intermediary) / No / N/A
    validations:
      required: true

  - type: textarea
    id: data-affected
    attributes:
      label: Data affected
      description: "Categories of personal data involved. Reference the Personal Data Inventory in SOP Section 15."
    validations:
      required: true

  - type: textarea
    id: containment
    attributes:
      label: Containment actions
      description: "What was done to stop the breach and prevent further exposure"
    validations:
      required: true

  - type: textarea
    id: remedial
    attributes:
      label: Remedial actions
      description: "Corrective measures taken or planned to prevent recurrence"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence preserved
      description: "Links to logs, screenshots, exports. See SOP Section 14 for requirements."
    validations:
      required: true

  - type: textarea
    id: post-incident
    attributes:
      label: Post-incident review
      description: "Link to review document when complete, or 'Pending'. Due within 7 days of resolution (SOP Section 17)."
      placeholder: "Pending"
    validations:
      required: false
